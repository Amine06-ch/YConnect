<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - YConnect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-wrapper">
    <div class="phone-frame">

      <header class="topbar">
        <div class="topbar-left">
          <img src="assets/logo.png" alt="Logo YConnect" class="top-logo">
          <div class="brand-text">
            <h1>YConnect</h1>
            <p>Connexion</p>
          </div>
        </div>
        <button class="icon-btn" onclick="window.location.href='index.html'">⌂</button>
      </header>

      <section class="feed-header">
        <span>LOGIN</span>
        <span>YNOV</span>
        <span>SECURE</span>
      </section>

      <main class="feed auth-feed">
        <section class="auth-card">
          <h2>Se connecter</h2>
          <p class="auth-subtitle">Entre ton email et ton mot de passe.</p>

          <div class="auth-alert" id="loginAlert" style="display:none;"></div>

          <form class="auth-form" onsubmit="ycLogin(event)">
            <label class="auth-label">
              Email
              <input id="loginEmail" class="auth-input" type="email" placeholder="prenom.nom@ynov.com" required />
            </label>

            <label class="auth-label">
              Campus Ynov
              <select id="loginCampus" class="auth-input" required>
                <option value="" disabled selected>Sélectionnez un campus</option>
              </select>
            </label>

            <label class="auth-label">
              Mot de passe
              <input id="loginPassword" class="auth-input" type="password" placeholder="••••••••" required />
            </label>

            <button class="auth-primary-btn" type="submit">Connexion</button>

            <div class="auth-links">
              <a href="register.html">Créer un compte</a>
              <a href="index.html">Retour</a>
            </div>
          </form>
        </section>

        <section class="auth-card auth-info-card">
          <h3>Compte non Ynov ?</h3>
          <p class="auth-muted">
            Si ton email n’est pas en <strong>@ynov.com</strong>, tu peux faire une demande d’accès depuis la page d’inscription.
          </p>
          <button class="auth-secondary-btn" onclick="window.location.href='register.html'">Faire une demande</button>
        </section>
      </main>

      <nav class="bottom-nav">
        <button onclick="window.location.href='bot.html'">🤖</button>
        <button onclick="window.location.href='index.html'">⌂</button>
        <button onclick="window.location.href='search.html'">⌕</button>
        <button onclick="window.location.href='messages.html'">💬</button>
        <button onclick="window.location.href='profile.html'">👤</button>
      </nav>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
