<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages - YConnect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-requires-auth="true">
  <div class="app-wrapper">
    <div class="phone-frame">

      <header class="topbar">
        <div class="topbar-left">
          <img src="assets/logo.png" alt="Logo YConnect" class="top-logo">
          <div class="brand-text">
            <h1>YConnect</h1>
            <p>Messagerie</p>
          </div>
        </div>
        <button class="icon-btn">✉</button>
      </header>

      <section class="feed-header">
        <span id="tabCampus" style="cursor:pointer;">MON.YNOV</span>
        <span id="tabFrance" style="cursor:pointer;">FRANCE</span>
        <span id="tabCampusName">CAMPUS</span>
      </section>

      <main class="feed">

        <section class="messages-list-card">
          <div class="section-title-row">
            <h2>Conversations</h2>
          </div>

          <div class="conversation-item active-conversation" id="convCampus" style="cursor:pointer;">
            <div class="conversation-avatar" id="convCampusAvatar">Y</div>
            <div class="conversation-info">
              <h3 id="convCampusTitle">Mon campus</h3>
              <p id="convCampusSubtitle">Salon du campus</p>
            </div>
            <span class="conversation-time" id="convCampusTime">—</span>
          </div>

          <div class="conversation-item" id="convFrance" style="cursor:pointer;">
            <div class="conversation-avatar">FR</div>
            <div class="conversation-info">
              <h3>France</h3>
              <p>Salon global Ynov</p>
            </div>
            <span class="conversation-time" id="convFranceTime">—</span>
          </div>
        </section>

        <section class="chat-card">
          <div class="chat-header">
            <div class="chat-user">
              <div class="conversation-avatar" id="chatAvatar">Y</div>
              <div>
                <h3 id="chatTitle">Mon Ynov</h3>
                <p id="chatSubtitle">Salon</p>
              </div>
            </div>
          </div>

          <div class="chat-messages" id="chatMessages"></div>

          <form class="message-form" onsubmit="ycSendRoomMessage(event)">
            <input id="messageInput" type="text" placeholder="Écrire un message..." />
            <button type="submit">Envoyer</button>
          </form>
        </section>

      </main>

    <nav class="bottom-nav">
<button onclick="window.location.href='bot.html'">🤖</button>
  <button onclick="window.location.href='index.html'">⌂</button>
  <button onclick="window.location.href='search.html'">⌕</button>
  <button onclick="window.location.href='profile.html'">👤</button>
</nav>

    </div>
  </div>
</body>
</html>
