<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recherche - YConnect</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-wrapper">
    <div class="phone-frame">

      <!-- Ambient background -->
      <div class="ambient">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="noise"></div>
      </div>

      <!-- Topbar -->
      <header class="topbar">
        <a href="index.html" class="topbar-left logo-link">
          <img src="assets/logo.png" alt="Logo YConnect" class="top-logo" />
          <div class="brand-text">
            <h1>YConnect</h1>
            <p>Recherche</p>
          </div>
        </a>

        <button class="icon-btn" type="button" aria-label="Messagerie" onclick="window.location.href='messages.html'">
          ✉
        </button>
      </header>

      <!-- Info strip -->
      <section class="date-strip" aria-label="Informations recherche">
        <div class="ds-pill">
          <span class="ds-key">Mode</span>
          <span class="ds-val accent">RECHERCHE</span>
        </div>
        <div class="ds-divider"></div>
        <div class="ds-pill">
          <span class="ds-key">Campus</span>
          <span class="ds-val">YNOV</span>
        </div>
        <div class="ds-divider"></div>
        <div class="ds-pill">
          <span class="ds-key">Focus</span>
          <span class="ds-val">PROJETS</span>
        </div>
      </section>

      <main class="feed">

        <!-- Hero -->
        <section class="profile-banner clickable-card">
          <div class="pb-glow"></div>

          <div class="pb-left">
            <div class="pb-av">⌕</div>
            <div class="pb-text">
              <span class="pb-greet">Explore l’écosystème YConnect</span>
              <span class="pb-name">Trouve les bons profils</span>
              <span class="pb-role">Étudiants • Projets • Réseau • Opportunités</span>
            </div>
          </div>

          <div class="pb-cta">
            Smart search
          </div>
        </section>

        <!-- Search -->
        <section class="search-bar">
          <input id="searchInput" type="text" placeholder="Rechercher un étudiant, projet, Ynov..."
            autocomplete="off" />
        </section>

        <!-- Filters -->
        <section class="filter-row">
          <button class="filter-btn active" type="button" data-filter="tous">Tous</button>
          <button class="filter-btn" type="button" data-filter="etudiant">Étudiants</button>
          <button class="filter-btn" type="button" data-filter="projet">Projets</button>
        </section>

        <!-- Quick suggestions -->
        <section class="block">
          <div class="block-head">
            <h2 class="block-title">Suggestions</h2>
          </div>

          <div class="news-track">
            <button class="ncard ncard--dark" type="button"
              onclick="document.getElementById('searchInput').value='Front-end'; document.getElementById('searchInput').dispatchEvent(new Event('input'));">
              <span class="ncard-tag ncard-tag--live">TOP</span>
              <h3>Front-end</h3>
              <p>Retrouve les profils orientés interfaces, intégration et design web.</p>
              <div class="ncard-shimmer"></div>
            </button>

            <button class="ncard ncard--glass" type="button"
              onclick="document.getElementById('searchInput').value='Application étudiante'; document.getElementById('searchInput').dispatchEvent(new Event('input'));">
              <span class="ncard-tag ncard-tag--new">IDEA</span>
              <h3>Apps étudiantes</h3>
              <p>Explore les concepts utiles à la vie étudiante et à la collaboration.</p>
            </button>

            <button class="ncard ncard--teal" type="button"
              onclick="document.getElementById('searchInput').value='UI Design'; document.getElementById('searchInput').dispatchEvent(new Event('input'));">
              <span class="ncard-tag ncard-tag--event">UX</span>
              <h3>UI Design</h3>
              <p>Découvre des profils sensibles à l’expérience utilisateur et au visuel.</p>
            </button>
          </div>
        </section>

        <!-- Results -->
        <section class="block">
          <div class="block-head">
            <h2 class="block-title">Résultats</h2>
          </div>

          <section class="results" id="resultsContainer"></section>
        </section>

      </main>

      <!-- Bottom nav style index -->
      <nav class="bnav" aria-label="Navigation principale">
        <button class="bnav-item" type="button" aria-label="Bot IA" onclick="window.location.href='bot.html'">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            <circle cx="12" cy="16" r="1" fill="currentColor" stroke="none" />
          </svg>
        </button>

        <button class="bnav-item" type="button" aria-label="Accueil" onclick="window.location.href='index.html'">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
        </button>

        <button class="bnav-item bnav-item--active" type="button" aria-label="Recherche">
          <div class="bnav-active-pill">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </div>
        </button>

        <button class="bnav-item" type="button" aria-label="Messages" onclick="window.location.href='messages.html'">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        </button>

        <button class="bnav-item" type="button" aria-label="Profil" onclick="window.location.href='profile.html'">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </button>
      </nav>

    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
