<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription - YConnect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-wrapper">
    <div class="phone-frame auth-screen compact-auth-screen">

      <div class="auth-top compact-auth-top">
        <img src="assets/logo.png" alt="Logo YConnect" class="auth-logo-large compact-logo">
        <h1>YConnect</h1>
        <p>Rejoins la communauté Ynov</p>
      </div>

      <main class="auth-main compact-auth-main">
        <div class="auth-card premium-auth-card compact-auth-card">
          
          <div class="auth-card-header compact-auth-header">
            <h2>Inscription</h2>
            <span>Créer un compte</span>
          </div>

          <div class="auth-form-group">
            <label for="registerEmail">Adresse email</label>
            <input id="registerEmail" type="email" placeholder="exemple@ynov.com" />
          </div>

          <div class="auth-form-group">
            <label for="registerPassword">Mot de passe</label>
            <input id="registerPassword" type="password" placeholder="••••••••" />
          </div>

          <button class="auth-submit-btn" onclick="register()">Créer un compte</button>

          <p class="auth-switch-text">
            Déjà inscrit ?
            <a href="login.html">Se connecter</a>
          </p>

        </div>
      </main>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
